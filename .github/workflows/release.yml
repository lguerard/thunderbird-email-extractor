name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      bump_type: ${{ steps.version.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from commits
        id: version
        run: |
          VERSION=$(node -p 'require("./manifest.json").version')
          echo "Current version: $VERSION"

          # Get commits since last tag or last release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline)
          fi

          echo "Commits to analyze:"
          echo "$COMMITS"

          # Check for major (breaking changes)
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|feat!:|fix!:|refactor!:)"; then
            BUMP_TYPE="major"
          # Check for minor (new features)
          elif echo "$COMMITS" | grep -qE "(feat|feat\(.*\):)"; then
            BUMP_TYPE="minor"
          # Default to patch
          else
            BUMP_TYPE="patch"
          fi

          echo "Bump type: $BUMP_TYPE"

          # Split version into parts
          IFS='.' read -r major minor patch <<< "$VERSION"

          case "$BUMP_TYPE" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          echo "New version: $NEW_VERSION"

          # Update manifest.json
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version for build
        run: |
          VERSION="${{ needs.bump-version.outputs.new_version }}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build
        run: |
          npm install -g web-ext
          web-ext build --overwrite-dest

      - name: Rename artifact with version
        run: |
          NEW_VERSION="${{ needs.bump-version.outputs.new_version }}"
          cd web-ext-artifacts
          FILENAME=$(ls *.zip)
          NEW_NAME="email-senders-extractor-${NEW_VERSION}.zip"
          mv "$FILENAME" "$NEW_NAME"
          ls -la

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbird-email-extractor
          path: web-ext-artifacts/*.zip

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: thunderbird-email-extractor

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          tag_name: "v${{ needs.bump-version.outputs.new_version }}"
          body: "Version bump: ${{ needs.bump-version.outputs.bump_type }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}