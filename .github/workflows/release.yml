name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          VERSION=$(node -p 'require("./manifest.json").version')
          echo "Current version: $VERSION"

          # Split version into parts
          IFS='.' read -r major minor patch <<< "$VERSION"

          # Increment based on bump type
          BUMP_TYPE=${{ github.event.inputs.bump_type }}
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE=patch
          fi

          case "$BUMP_TYPE" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          echo "New version: $NEW_VERSION"

          # Update manifest.json
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build
        run: |
          npm install -g web-ext
          web-ext build --overwrite-dest 2>&1 || echo "Build exit code: $?"

      - name: List build artifacts
        run: |
          echo "Current dir: $(pwd)"
          echo "Files:"
          find . -type f -name "*.xpi" 2>/dev/null
          echo "web-ext-artifacts contents:"
          ls -la web-ext-artifacts/ 2>/dev/null || echo "Directory does not exist"

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbird-email-extractor
          path: web-ext-artifacts/*.zip

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: thunderbird-email-extractor

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          tag_name: "v${{ needs.bump-version.outputs.new_version }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}