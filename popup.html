<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        width: 380px;
        background: #f5f5f5;
      }
      h2 {
        color: #333;
        margin-bottom: 10px;
        font-size: 18px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 15px;
        line-height: 1.5;
      }
      button {
        background: #0078d4;
        color: white;
        padding: 12px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        transition: background 0.2s;
      }
      button:hover {
        background: #005a9e;
      }
      button:active {
        background: #004578;
      }
      #status {
        margin-top: 15px;
        padding: 12px;
        border-radius: 4px;
        display: none;
        font-size: 13px;
        font-weight: 500;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
    </style>
  </head>
  <body>
    <h2>📧 Email Extractor</h2>
    <p>
      Right-click the filter folder in the folder panel to extract unique email
      addresses.
    </p>

    <button id="currentFolderBtn">Extract from current folder</button>
    <button id="allFoldersBtn">Extract from ALL folders</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
