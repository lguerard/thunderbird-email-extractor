<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        width: 320px;
        background: #f5f5f5;
      }
      h2 {
        color: #333;
        margin-bottom: 8px;
        font-size: 16px;
      }
      .info-section {
        background: #e8f4fc;
        border: 1px solid #b8d4e8;
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 12px;
        font-size: 13px;
        color: #333;
      }
      .info-section strong {
        display: block;
        margin-bottom: 4px;
      }
      button {
        background: #0078d4;
        color: white;
        padding: 10px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        transition: background 0.2s;
      }
      button:hover {
        background: #005a9e;
      }
      button:active {
        background: #004578;
      }
      button.secondary {
        background: #6c757d;
      }
      button.secondary:hover {
        background: #5a6268;
      }
      #status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 4px;
        display: none;
        font-size: 12px;
        font-weight: 500;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
      .stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 12px;
        color: #666;
      }
      .stats span {
        background: #fff;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h2>📧 Email Senders Extractor</h2>
    <p style="font-size:13px;color:#666;margin-bottom:12px;">
      Automatically adds email senders to your address book. Scans new emails daily.
    </p>

    <div class="stats">
      <span id="processedCount">Processed: 0</span>
      <span id="lastScan">Last: Never</span>
    </div>

    <button id="runScanBtn">Run Scan Now</button>
    <button id="scanInboxBtn" class="secondary">Scan Inbox Only</button>
    <button id="resetBtn" class="secondary">Reset Processed History</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
